<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>BinNexus Probe Panel</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="/static/style.css" />
	</head>
	<body>
		<div class="layout">
			<aside class="sidebar">
				<div class="brand">
					<h1>BinNexus Probe</h1>
					<p>Scans binaries for API usage patterns</p>
				</div>

				<label class="label">DLL / EXE</label>

				<div id="dropZone" class="drop-zone">
					<div class="file-input">
						<input
							id="path"
							class="input"
							placeholder="F:\...\server.dll или перетащи файл сюда"
						/>
						<input type="file" id="filePicker" hidden />
						<button id="browseBtn" class="button">Browse</button>
					</div>

					<div class="drop-hint">Drop DLL / EXE here</div>
				</div>

				<label class="label">Search rules (one API per line)</label>
				<textarea id="apis" class="textarea">{{ default_apis }}</textarea>

				<div class="actions">
					<button id="analyzeBtn" class="button primary">Analyze</button>
					<button id="clearBtn" class="button">Clear</button>
					<button id="savePresetBtn" class="button">Save Profile</button>
				</div>
				<div class="hint">Right click to delete preset</div>

				<div class="chips" id="chips"></div>
			</aside>

			<main class="content">
				<div class="toolbar">
					<div>
						<h2>Results</h2>
						<p id="summary">No analysis yet</p>
					</div>
				</div>

				<div id="errorBox" class="error hidden"></div>
				<div id="results" class="results"></div>
			</main>
		</div>

		<script src="/static/app.js"></script>
	</body>
</html>
